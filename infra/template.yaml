AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Promptdis Serverless Deployment — FastAPI on Lambda with EFS-backed SQLite,
  DynamoDB OAuth state, S3 TTS cache, and CloudFront-served web UI.

# ─────────────────────────────────────────────────────────────────────────────
# Parameters
# ─────────────────────────────────────────────────────────────────────────────
Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment stage

  VpcCidr:
    Type: String
    Default: "10.0.0.0/16"
    Description: VPC CIDR block

  SubnetACidr:
    Type: String
    Default: "10.0.1.0/24"

  SubnetBCidr:
    Type: String
    Default: "10.0.2.0/24"

  GitHubClientId:
    Type: String
    NoEcho: true
    Description: GitHub OAuth app client ID

  GitHubClientSecret:
    Type: String
    NoEcho: true
    Description: GitHub OAuth app client secret

  AppSecretKey:
    Type: String
    NoEcho: true
    Description: Session signing key

  FrontendUrl:
    Type: String
    Default: ""
    Description: CloudFront URL for the web UI (set after first deploy)

  CorsOrigins:
    Type: String
    Default: "http://localhost:5173"
    Description: Comma-separated allowed CORS origins

  AppBaseUrl:
    Type: String
    Default: ""
    Description: Base URL for the API (e.g. https://api.promptdis.com). Set after first deploy if using raw API Gateway URL.

  DomainName:
    Type: String
    Default: ""
    Description: Custom domain for the web UI (e.g. app.promptdis.com). Leave blank to skip.

  AcmCertificateArn:
    Type: String
    Default: ""
    Description: ACM certificate ARN (must be in us-east-1) for the web UI custom domain.

  ApiDomainName:
    Type: String
    Default: ""
    Description: Custom domain for the API (e.g. api.promptdis.com). Leave blank to skip.

  ApiAcmCertificateArn:
    Type: String
    Default: ""
    Description: ACM certificate ARN (in the deploy region) for the API custom domain.

  ElevenLabsApiKey:
    Type: String
    Default: "none"
    NoEcho: true
    Description: ElevenLabs API key (optional, for TTS preview)

# ─────────────────────────────────────────────────────────────────────────────
# Conditions
# ─────────────────────────────────────────────────────────────────────────────
Conditions:
  HasCustomDomain: !Not [!Equals [!Ref DomainName, ""]]
  HasApiDomain: !Not [!Equals [!Ref ApiDomainName, ""]]

# ─────────────────────────────────────────────────────────────────────────────
# Globals
# ─────────────────────────────────────────────────────────────────────────────
Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        DEPLOYMENT_MODE: lambda
        STAGE: !Ref Stage
        DATABASE_PATH: /mnt/efs/data/promptdis.db
        DYNAMODB_STATE_TABLE: !Ref OAuthStateTable
        S3_TTS_BUCKET: !Ref TTSCacheBucket
        GITHUB_CLIENT_ID: !Ref GitHubClientId
        GITHUB_CLIENT_SECRET: !Ref GitHubClientSecret
        APP_SECRET_KEY: !Ref AppSecretKey
        FRONTEND_URL: !Ref FrontendUrl
        CORS_ORIGINS: !Ref CorsOrigins
        APP_BASE_URL: !Ref AppBaseUrl
        ELEVENLABS_API_KEY: !Ref ElevenLabsApiKey
        LOG_LEVEL: info

Resources:
  # ───────────────────────────────────────────────────────────────────────────
  # Networking
  # ───────────────────────────────────────────────────────────────────────────
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "promptdis-${Stage}-vpc"

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetACidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "promptdis-${Stage}-subnet-a"

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref SubnetBCidr
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "promptdis-${Stage}-subnet-b"

  # ───────────────────────────────────────────────────────────────────────────
  # Networking — Internet access for Lambda (NAT Gateway)
  # ───────────────────────────────────────────────────────────────────────────
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: "10.0.3.0/24"
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "promptdis-${Stage}-public-subnet"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "promptdis-${Stage}-igw"

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "promptdis-${Stage}-public-rt"

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  NatEIP:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnet
      Tags:
        - Key: Name
          Value: !Sub "promptdis-${Stage}-nat"

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "promptdis-${Stage}-private-rt"

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      NatGatewayId: !Ref NatGateway

  PrivateSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTable

  # ───────────────────────────────────────────────────────────────────────────
  # EFS (SQLite storage — persists across Lambda invocations)
  # ───────────────────────────────────────────────────────────────────────────
  FileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      FileSystemTags:
        - Key: Name
          Value: !Sub "promptdis-${Stage}-efs"

  MountTargetA:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Ref PrivateSubnetA
      SecurityGroups:
        - !Ref EFSSecurityGroup

  MountTargetB:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Ref PrivateSubnetB
      SecurityGroups:
        - !Ref EFSSecurityGroup

  AccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref FileSystem
      PosixUser:
        Uid: "1000"
        Gid: "1000"
      RootDirectory:
        CreationInfo:
          OwnerUid: "1000"
          OwnerGid: "1000"
          Permissions: "755"
        Path: "/promptdis"

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow NFS from Lambda
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref LambdaSecurityGroup

  # ───────────────────────────────────────────────────────────────────────────
  # DynamoDB (OAuth CSRF state — TTL auto-expiry)
  # ───────────────────────────────────────────────────────────────────────────
  OAuthStateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "promptdis-oauth-states-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: state
          AttributeType: S
      KeySchema:
        - AttributeName: state
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ───────────────────────────────────────────────────────────────────────────
  # S3 — TTS audio cache (24h lifecycle expiry)
  # ───────────────────────────────────────────────────────────────────────────
  TTSCacheBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "promptdis-tts-cache-${Stage}"
      LifecycleConfiguration:
        Rules:
          - Id: ExpireTTSCache
            Status: Enabled
            ExpirationInDays: 1

  # ───────────────────────────────────────────────────────────────────────────
  # S3 — Web UI static assets
  # ───────────────────────────────────────────────────────────────────────────
  WebBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "promptdis-web-${Stage}"

  WebBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${WebBucket.Arn}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${WebDistribution}"

  # ───────────────────────────────────────────────────────────────────────────
  # CloudFront — Web UI CDN with SPA routing
  # ───────────────────────────────────────────────────────────────────────────
  WebOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "promptdis-web-oac-${Stage}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  WebDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !GetAtt WebBucket.RegionalDomainName
            Id: S3Origin
            OriginAccessControlId: !Ref WebOriginAccessControl
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        DefaultRootObject: index.html
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        Aliases: !If
          - HasCustomDomain
          - [!Ref DomainName]
          - !Ref "AWS::NoValue"
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref AcmCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - !Ref "AWS::NoValue"
        Enabled: true
        HttpVersion: http2and3
        Comment: !Sub "Promptdis Web UI (${Stage})"

  # ───────────────────────────────────────────────────────────────────────────
  # Lambda — API (Mangum + FastAPI)
  # ───────────────────────────────────────────────────────────────────────────
  ApiFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - MountTargetA
      - MountTargetB
    Metadata:
      BuildMethod: makefile
    Properties:
      FunctionName: !Sub "promptdis-${Stage}-api"
      Handler: server.lambda_handler.handler
      CodeUri: ..
      MemorySize: 512
      Timeout: 30
      # ReservedConcurrentExecutions: 1  # SQLite single-writer — requires concurrency quota increase
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
      FileSystemConfigs:
        - Arn: !GetAtt AccessPoint.Arn
          LocalMountPath: /mnt/efs
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OAuthStateTable
        - S3CrudPolicy:
            BucketName: !Ref TTSCacheBucket
      Events:
        CatchAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi

  # ───────────────────────────────────────────────────────────────────────────
  # Lambda — Session Cleanup (EventBridge hourly schedule)
  # ───────────────────────────────────────────────────────────────────────────
  CleanupFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - MountTargetA
      - MountTargetB
    Metadata:
      BuildMethod: makefile
    Properties:
      FunctionName: !Sub "promptdis-${Stage}-cleanup"
      Handler: scripts.cleanup_sessions_handler.handler
      CodeUri: ..
      Timeout: 60
      MemorySize: 256
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
      FileSystemConfigs:
        - Arn: !GetAtt AccessPoint.Arn
          LocalMountPath: /mnt/efs
      Events:
        HourlyCleanup:
          Type: Schedule
          Properties:
            Schedule: "rate(1 hour)"
            Description: Clean up expired Promptdis sessions

  # ───────────────────────────────────────────────────────────────────────────
  # API Gateway (HTTP API v2)
  # ───────────────────────────────────────────────────────────────────────────
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      DefaultRouteSettings:
        ThrottlingBurstLimit: 50
        ThrottlingRateLimit: 100

  # ───────────────────────────────────────────────────────────────────────────
  # API Gateway — Custom Domain (api.promptdis.com)
  # ───────────────────────────────────────────────────────────────────────────
  ApiCustomDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Condition: HasApiDomain
    Properties:
      DomainName: !Ref ApiDomainName
      DomainNameConfigurations:
        - EndpointType: REGIONAL
          CertificateArn: !Ref ApiAcmCertificateArn

  ApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Condition: HasApiDomain
    DependsOn: ApiCustomDomain
    Properties:
      ApiId: !Ref HttpApi
      DomainName: !Ref ApiDomainName
      Stage: !Ref Stage

  # ───────────────────────────────────────────────────────────────────────────
  # Security Group — Lambda functions
  # ───────────────────────────────────────────────────────────────────────────
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Promptdis Lambda function security group
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "promptdis-${Stage}-lambda-sg"

  # ───────────────────────────────────────────────────────────────────────────
  # CloudWatch Alarms
  # ───────────────────────────────────────────────────────────────────────────
  ApiErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "promptdis-${Stage}-api-errors"
      AlarmDescription: Lambda API function errors exceed threshold
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiFunction

  ApiDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "promptdis-${Stage}-api-duration"
      AlarmDescription: Lambda API function duration exceeds threshold
      MetricName: Duration
      Namespace: AWS/Lambda
      ExtendedStatistic: p99
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10000
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiFunction

  ApiThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "promptdis-${Stage}-api-throttles"
      AlarmDescription: Lambda API function throttled
      MetricName: Throttles
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiFunction

# ─────────────────────────────────────────────────────────────────────────────
# Outputs
# ─────────────────────────────────────────────────────────────────────────────
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !If
      - HasApiDomain
      - !Sub "https://${ApiDomainName}"
      - !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"

  ApiDomainTarget:
    Condition: HasApiDomain
    Description: CNAME target for api custom domain (use in Cloudflare DNS)
    Value: !GetAtt ApiCustomDomain.RegionalDomainName

  WebDistributionUrl:
    Description: CloudFront distribution URL for web UI
    Value: !Sub "https://${WebDistribution.DomainName}"

  WebDistributionId:
    Description: CloudFront distribution ID (for cache invalidation)
    Value: !Ref WebDistribution

  WebBucketName:
    Description: S3 bucket for web UI assets
    Value: !Ref WebBucket

  ApiFunctionName:
    Description: Lambda function name for API
    Value: !Ref ApiFunction

  EfsId:
    Description: EFS filesystem ID
    Value: !Ref FileSystem

  OAuthTableName:
    Description: DynamoDB table for OAuth state
    Value: !Ref OAuthStateTable

  TTSBucketName:
    Description: S3 bucket for TTS audio cache
    Value: !Ref TTSCacheBucket
