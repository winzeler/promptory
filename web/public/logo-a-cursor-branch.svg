<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Rounded square background -->
  <rect x="2" y="2" width="60" height="60" rx="12" ry="12" fill="#1f2937" />

  <!-- Terminal prompt cursor ">_" -->
  <text x="8" y="38" font-family="monospace, 'Courier New'" font-size="22" font-weight="bold" fill="#f9fafb">&gt;_</text>

  <!-- Git branch lines forking from cursor -->
  <line x1="38" y1="32" x2="48" y2="20" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" />
  <line x1="38" y1="32" x2="48" y2="44" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" />

  <!-- Branch dots (commits) -->
  <circle cx="50" cy="19" r="4" fill="#3b82f6" />
  <circle cx="50" cy="45" r="4" fill="#3b82f6" />

  <!-- Center node -->
  <circle cx="37" cy="32" r="3" fill="#3b82f6" />
</svg>
